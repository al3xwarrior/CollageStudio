<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Create custom photo collages in a clean browser-based editor with masonry, scattered, and polaroid layouts."
    />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2563eb" />
    <meta property="og:title" content="Collage Studio" />
    <meta
      property="og:description"
      content="A modern frontend photo collage creator for arranging, cropping, and exporting image layouts."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/collage-logo.png" />
    <meta property="og:site_name" content="Collage Studio" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Collage Studio" />
    <meta
      name="twitter:description"
      content="Create clean custom photo collages directly in your browser."
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <title>Collage Studio | Photo Collage Creator</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Collage Studio",
        "applicationCategory": "MultimediaApplication",
        "operatingSystem": "Any",
        "description": "Create custom photo collages in a clean browser-based editor with masonry, scattered, and polaroid layouts."
      }
    </script>
  </head>
  <body>
    <div class="app-shell">
      <header class="site-header">
        <a class="brand-link" href="/" aria-label="Collage Studio home">
          <img class="brand-logo" src="/collage-logo.png" alt="" />
          <span class="brand-title">Collage Studio</span>
        </a>
      </header>

      <main class="studio-layout">
        <section class="preview-card live-preview-card" aria-labelledby="preview-title">
          <div class="preview-topbar">
            <div class="section-heading">
              <div>
                <h2 id="preview-title">Preview</h2>
                <p id="preview-meta">Generated collage preview will appear here.</p>
              </div>
            </div>
            <div class="preview-actions" id="preview-actions">
              <button class="button primary small-button" id="generate-button" type="button">Generate</button>
              <button class="button secondary small-button" id="regenerate-button" type="button">Regenerate</button>
              <button class="button secondary small-button" id="download-button" type="button">Download</button>
            </div>
          </div>

          <div class="generated-placeholder" id="generated-placeholder">
            <div id="konva-stage" class="konva-stage" aria-label="Generated collage preview"></div>
            <div class="floating-image-controls" id="floating-image-controls" hidden>
              <button
                class="floating-control-button"
                id="send-backward-button"
                type="button"
                aria-label="Move back one layer"
                title="Move back one layer"
              >
                -1&#9633;
              </button>
              <button
                class="floating-control-button"
                id="bring-forward-button"
                type="button"
                aria-label="Move up one layer"
                title="Move up one layer"
              >
                +1&#9633;
              </button>
              <button
                class="floating-control-button"
                id="rotate-left-button"
                type="button"
                aria-label="Rotate left"
                title="Rotate left"
              >
                &#8634;
              </button>
              <button
                class="floating-control-button"
                id="rotate-right-button"
                type="button"
                aria-label="Rotate right"
                title="Rotate right"
              >
                &#8635;
              </button>
            </div>
            <p class="empty-preview-message" id="empty-preview-message">Upload images and generate a collage.</p>
          </div>
        </section>

        <div class="control-column">
          <section class="control-panel" aria-label="Collage controls">
            <div class="tab-list" role="tablist" aria-label="Editor panels">
              <button
                class="tab-button is-active"
                id="images-tab"
                type="button"
                role="tab"
                aria-selected="true"
                aria-controls="images-panel"
                data-tab-target="images-panel"
              >
                Images
              </button>
              <button
                class="tab-button"
                id="settings-tab"
                type="button"
                role="tab"
                aria-selected="false"
                aria-controls="settings-panel"
                data-tab-target="settings-panel"
              >
                Settings
              </button>
            </div>

            <div class="tab-panel is-active" id="images-panel" role="tabpanel" aria-labelledby="images-tab">
              <div class="section-heading">
                <div>
                  <h2 id="upload-title">Photos</h2>
                  <p>Add images to stage your collage layout.</p>
                </div>
                <span class="image-count" id="image-count">0 selected</span>
              </div>

              <label class="dropzone" id="dropzone" for="image-input">
                <input id="image-input" type="file" accept="image/*" multiple />
                <span class="dropzone-icon" aria-hidden="true">+</span>
                <span class="dropzone-title">Select images</span>
                <span class="dropzone-text">or drag and drop multiple images here</span>
              </label>

              <div class="image-grid" id="image-grid" aria-live="polite">
                <article class="image-card demo-card">
                  <div class="demo-preview demo-preview-one"></div>
                  <div class="card-actions">
                    <button class="icon-button" type="button" aria-label="Crop demo image">Crop</button>
                    <button class="icon-button danger" type="button" aria-label="Remove demo image">X</button>
                  </div>
                  <p>city-light.jpg</p>
                </article>
                <article class="image-card demo-card">
                  <div class="demo-preview demo-preview-two"></div>
                  <div class="card-actions">
                    <button class="icon-button" type="button" aria-label="Crop demo image">Crop</button>
                    <button class="icon-button danger" type="button" aria-label="Remove demo image">X</button>
                  </div>
                  <p>gallery-wall.jpg</p>
                </article>
                <article class="image-card demo-card">
                  <div class="demo-preview demo-preview-three"></div>
                  <div class="card-actions">
                    <button class="icon-button" type="button" aria-label="Crop demo image">Crop</button>
                    <button class="icon-button danger" type="button" aria-label="Remove demo image">X</button>
                  </div>
                  <p>weekend-trip.jpg</p>
                </article>
              </div>
            </div>

            <div class="tab-panel" id="settings-panel" role="tabpanel" aria-labelledby="settings-tab" hidden>
              <div class="section-heading compact">
                <div>
                  <h2 id="settings-title">Settings</h2>
                  <p>These values apply to the live preview.</p>
                </div>
              </div>

              <form id="settings-form" class="settings-form">
                <label class="field">
                  <span>Aspect ratio</span>
                  <select id="aspect-ratio" name="aspectRatio">
                    <option value="1:1 Square">1:1 Square</option>
                    <option value="16:9 Landscape">16:9 Landscape</option>
                    <option value="9:16 Portrait">9:16 Portrait</option>
                    <option value="4:5 Social Post">4:5 Social Post</option>
                    <option value="Custom">Custom</option>
                  </select>
                </label>

                <div class="custom-size-row" id="custom-size-row">
                  <label class="field">
                    <span>Custom width</span>
                    <input id="custom-width" name="customWidth" type="number" min="1" value="1200" />
                  </label>
                  <label class="field">
                    <span>Custom height</span>
                    <input id="custom-height" name="customHeight" type="number" min="1" value="1200" />
                  </label>
                </div>

                <label class="toggle-field">
                  <input id="border-enabled" name="borderEnabled" type="checkbox" checked />
                  <span>Enable border</span>
                </label>

                <label class="field">
                  <span>Border thickness</span>
                  <select id="border-thickness" name="borderThickness">
                    <option value="2">2 px</option>
                    <option value="4" selected>4 px</option>
                    <option value="8">8 px</option>
                    <option value="12">12 px</option>
                  </select>
                </label>

                <label class="field color-field">
                  <span>Background color</span>
                  <input id="background-color" name="backgroundColor" type="color" value="#f5f7fb" />
                </label>

                <label class="field">
                  <span>Layout style</span>
                  <select id="layout-style" name="layoutStyle">
                    <option value="Masonry">Masonry</option>
                    <option value="Polaroid">Polaroid</option>
                    <option value="Scattered">Scattered</option>
                    <option value="Polaroid Scattered">Polaroid Scattered</option>
                  </select>
                </label>

                <label class="field">
                  <span>Gap / spacing</span>
                  <input id="gap-spacing" name="gapSpacing" type="range" min="0" max="48" value="16" />
                </label>

                <label class="field range-field">
                  <span>Image scale <output id="image-scale-value" for="image-scale">100%</output></span>
                  <input id="image-scale" name="imageScale" type="range" min="70" max="145" value="100" />
                </label>

                <label class="field">
                  <span>Output format</span>
                  <select id="output-format" name="outputFormat">
                    <option value="PNG">PNG</option>
                    <option value="JPEG">JPEG</option>
                  </select>
                </label>
              </form>
            </div>

            <button id="clear-button" class="button secondary full-width-button" type="button">Clear All</button>
          </section>
        </div>
      </main>

      <footer class="site-footer">
        <a class="github-link" href="https://github.com/al3xwarrior" target="_blank" rel="noopener noreferrer">
          <svg class="github-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path
              fill="currentColor"
              d="M12 0C5.37 0 0 5.5 0 12.29c0 5.43 3.44 10.03 8.2 11.66.6.11.82-.27.82-.59 0-.29-.01-1.06-.02-2.08-3.34.74-4.04-1.65-4.04-1.65-.55-1.42-1.34-1.8-1.34-1.8-1.09-.77.08-.75.08-.75 1.2.09 1.84 1.27 1.84 1.27 1.07 1.88 2.81 1.34 3.5 1.02.11-.8.42-1.34.76-1.65-2.66-.31-5.47-1.36-5.47-6.08 0-1.34.47-2.44 1.24-3.3-.12-.31-.54-1.56.12-3.25 0 0 1.01-.33 3.3 1.26A11.2 11.2 0 0 1 12 5.94c1.02.01 2.05.14 3.01.41 2.29-1.59 3.3-1.26 3.3-1.26.66 1.69.24 2.94.12 3.25.77.86 1.24 1.96 1.24 3.3 0 4.73-2.81 5.76-5.49 6.07.43.38.82 1.13.82 2.28 0 1.65-.02 2.98-.02 3.38 0 .33.22.71.83.59C20.57 22.31 24 17.72 24 12.29 24 5.5 18.63 0 12 0Z"
            />
          </svg>
          <span>al3xwarrior</span>
        </a>
      </footer>
    </div>

    <div class="modal-backdrop" id="crop-modal" role="dialog" aria-modal="true" aria-labelledby="crop-modal-title" hidden>
      <div class="modal-card">
        <div class="modal-header">
          <h2 id="crop-modal-title">Crop Image</h2>
          <button class="icon-button danger" id="modal-close-button" type="button" aria-label="Close crop modal">X</button>
        </div>
        <div class="cropper-stage">
          <img id="cropper-image" alt="" />
        </div>
        <div class="modal-actions">
          <button class="button secondary" id="cancel-crop-button" type="button">Cancel</button>
          <button class="button primary" id="apply-crop-button" type="button">Apply Crop</button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
